background {
    monitor =
    path = ~/pictures/wallhaven-3lyrvy.png
    color = rgb(29, 32, 33)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 2 # 0 disables 
    blur_size = 2
  #  noise = 0.0117
  # contrast = 1
  # brightness = 0.8172
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date '+%I:%M')</span>"
    color = rgb(235, 219, 178)
    font_size = 75
    font_family = inter bold
    position = 0, -150
    halign = center
    valign = top
    shadow_passes = 2
    shadow_size = 10
  shadow_color = rgba(40, 40, 40, 0.6)

}

label {
    monitor =
    text = cmd[update:10000] fortune -a -s
    color = rgb(235, 219, 178)
    font_size = 16
    font_family = jetbrainsmononerdfont
    position = 0, 150
    halign = center
    valign = bottom
    shadow_passes = 2
    shadow_size = 10
}


input-field {
    monitor =
    size = 200, 40
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(40, 40, 40, 0.4)
    check_color = rgba(60, 56, 54, 0.8)
    fail_color = rgba(251, 73, 52, 0.7)
    font_color = rgb(235, 219, 178)
    fade_on_empty = true
    font_family = jetbrainsmononerdfont
    placeholder_text = Input Password...
    hide_input = false
    position = 0, -120
    rounding = 10
    halign = center
    valign = center
}

animations {
  bezier = linear, 1, 1, 0, 0
  animation = fade, 1, 3, linear
  animation = inputField, 1, 1, linear
}

